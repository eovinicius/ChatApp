name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - "infra/**"

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  plan:
    name: Plan (prod)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/environments/prod

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.6"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -var "jwt_secret_key=${{ secrets.TF_VAR_JWT_SECRET_KEY }}" \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Postar resultado no PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.existsSync('infra/environments/prod/plan_output.txt')
              ? fs.readFileSync('infra/environments/prod/plan_output.txt', 'utf8')
              : '(output não disponível)';

            const fmt      = '${{ steps.fmt.outcome }}'      === 'success' ? '✅' : '❌';
            const init     = '${{ steps.init.outcome }}'     === 'success' ? '✅' : '❌';
            const validate = '${{ steps.validate.outcome }}' === 'success' ? '✅' : '❌';
            const plan     = '${{ steps.plan.outcome }}'     === 'success' ? '✅' : '❌';

            const body = `#### Terraform Plan — \`prod\`

            | Etapa    | Status |
            |----------|--------|
            | Format   | ${fmt} |
            | Init     | ${init} |
            | Validate | ${validate} |
            | Plan     | ${plan} |

            <details><summary>Detalhes do Plan</summary>

            \`\`\`terraform
            ${planOutput.slice(0, 60000)}
            \`\`\`

            </details>

            *Acionado por: @${{ github.actor }} — \`${{ github.workflow }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Falhar se o Plan falhou
        if: steps.plan.outcome == 'failure'
        run: exit 1
